name = "freeloader-catalog"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "CATALOG_BUCKET"
bucket_name = "freeloader-catalog"

[[triggers]]
crons = ["0 3 * * *"]

[[routes]]
pattern = "catalog.freeloader.xswarm.ai/*"
zone_name = "freeloader.xswarm.ai"

[vars]
CATALOG_KEY = "catalog.json"
